<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="CallStack.css">
    
</head>

<body>

    <!-- FORM -->
    <div class="form-container">

        <h2>New Call</h2>

        <form>

            <label>Image url</label>
            <input required type="text" placeholder="Enter image url">

            <label>Full Name</label>
            <input required type="text" placeholder="ENter full name">

            <label>Home Town</label>
            <input required type="text" placeholder="Enter home town">

            <label>Purpose</label>
            <input required type="text" placeholder="Enter your purpose">

            <label>Category</label>

            <div class="category">

                <div class="three">
                    <input type="radio" id="Emergency" name="category" value="Emergency">
                    <label for="Emergency">Emergency</label>
                </div>

                <div class="three">
                    <input type="radio" id="Important" name="category" value="Important">
                    <label for="Important">Important</label>
                </div>

                <div class="three">
                    <input type="radio" id="Urgent" name="category" value="Urgent">
                    <label for="Urgent">Urgent</label>
                </div>

                <div class="three">
                    <input type="radio" id="No Rush" name="category" value="No Rush">
                    <label for="No Rush">No Rush</label>
                </div>

            </div>

            <button class="submit-btn">
                Create Note
            </button>

            <!-- IMPORTANT FIX -->
            <button type="button" class="Close">
                Close
            </button>

        </form>

    </div>

    <!-- BUTTONS -->
    <div class="btns">

        <button id="add-note" class="fab one plus">
            +
        </button>

        <button id="upBtn" class="fab one upKey">
            ↑
        </button>

        <button id="downBtn" class="fab one downKey">
            ↓
        </button>
        

    </div>

    <!-- CARDS WILL COME FROM JAVASCRIPT -->
    <div class="cards-wrapper">

    </div>

    

    <script src="CallStack.js"></script>
</body>

</html>
